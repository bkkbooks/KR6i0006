body:
  text: 梁扶南三藏僧伽婆羅譯如是我聞一時佛住舍衛國祇樹給孤獨園與大比丘衆一千二百五十人俱菩薩摩訶薩八萬人及諸天龍鬼神等爾時世尊告舍利弗從此佛世界向東方過一恆河沙世界有世界名曰天勝彼土有佛名善說吉如來應供正遍知今現在說法舍利弗從彼佛世界向東方過二恆河沙等世界有世界名念意彼土有佛名普光明如來應供正遍知今現在說法舍利弗從彼佛世界向東方過三恆河沙等世界有世界名可愛遊戲彼土有佛名戰鬪勝吉如來應供正遍知今現在說法舍利弗從彼世界向東方過四恆河沙等世界有世界名善清淨聚彼土有佛名自在幢王如來應供正遍知今現在說法舍利弗從彼佛世界向東方過五恆河沙等世界有世界名無塵聚彼土有佛名無邊功德光明吉如來應供正遍知今現在說法舍利弗從彼佛世界向東方過六恆河沙等世界有世界名無妨礙遊戲彼土有佛名無障礙業柱吉如來應供正遍知今現在說法舍利弗從彼佛世界向東方過七恆河沙等世界有世界名金聚彼土有佛名妙華勇猛如來應供正遍知今現在說法舍利弗從彼佛世界向東方過八恆河沙等世界有世界名美聲彼土有佛名寶蓮華安住王如來應供正遍知今現在說法舍利弗此八佛土皆悉清淨無有女人亦無五濁舍利弗若善男子善女人住大乘者聞此八佛名號受持不忘并為他說若生三塗八難處者無有是處若有女人聞八佛名號自能憶持兼為他說若更受女身無有是處舍利弗若善男子善女人住於大乘聞此八佛名號聞已受持為他人說今世後世常有神通得樂說辨深修禪定具陀羅尼六根清淨恆值聖人無天龍夜叉人及非人盜賊水火毒藥等畏一切怖畏皆悉除滅臥覺常安無諸惡夢常為諸天之所守護爾時世尊說此祇夜若有善男子及以諸女人聞八佛號名憶持為人說身心常安隱無有諸恐怖繫念不忘失滅無量劫罪後生天人中遠離諸惡趣六根常清淨端正有威德八部諸善神是夜常守護人天所恭敬供養生欣喜夜叉及非人盜賊與刀杖水火毒藥等此畏皆悉無臥覺恆安隱無有諸惡夢利根有智慧常樂聞正法聞已生信心得深妙法者口氣無臭穢精進為他說衆魔及外道無有敢干亂女人聞佛名憶持為他說盡此女人報後生不復受誦持為人說八佛之名號得諸功德果如上之所說是故有智者惟當念受持一心懷欣喜不應起放逸佛說此經已長老舍利弗等諸大比丘并諸菩薩摩訶薩衆天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等聞佛所說歡喜奉行
